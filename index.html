<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LawOfficeOfHongminJun Artist NIW Matrix</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --brand: #0f172a;
      --brand2: #334155;
      --green-bg: #ecfdf5;
      --green-tx: #047857;
      --amber-bg: #fffbeb;
      --amber-tx: #b45309;
      --rose-bg: #fff1f2;
      --rose-tx: #be123c;
      --blue-bg: #eff6ff;
      --blue-tx: #1d4ed8;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --radius: 20px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-user-select: none;
      user-select: none;
    }
    input, textarea, select, button {
      font: inherit;
    }
    input, textarea {
      -webkit-user-select: text;
      user-select: text;
    }
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 22px;
    }
    .hero {
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      color: white;
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      margin-bottom: 22px;
    }
    .hero-top {
      display: flex;
      gap: 20px;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.95);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      letter-spacing: .02em;
    }
    h1 { margin: 14px 0 10px; font-size: 38px; line-height: 1.1; }
    .hero p { margin: 0; color: rgba(255,255,255,.86); line-height: 1.65; }
    .lang-toggle {
      display: inline-flex;
      gap: 6px;
      padding: 6px;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 18px;
      background: rgba(255,255,255,.08);
    }
    .lang-toggle button {
      border: 0;
      background: transparent;
      color: white;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
    }
    .lang-toggle button.active {
      background: white;
      color: var(--brand);
      font-weight: bold;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
      margin-top: 20px;
    }
    .firm-box, .action-box {
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 24px;
      background: rgba(255,255,255,.08);
      padding: 18px;
      backdrop-filter: blur(6px);
    }
    .firm-name { font-size: 24px; font-weight: bold; letter-spacing: .03em; }
    .firm-tag { color: rgba(255,255,255,.78); font-size: 13px; margin-top: 4px; }
    .firm-line { margin-top: 10px; color: rgba(255,255,255,.92); font-size: 14px; line-height: 1.6; }
    .protect {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.08);
      font-size: 12px;
      line-height: 1.65;
      color: rgba(255,255,255,.88);
    }
    .action-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: end; }
    .btn {
      border: 0;
      padding: 13px 14px;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 600;
    }
    .btn.white { background: white; color: var(--brand); }
    .btn.soft { background: rgba(255,255,255,.86); color: var(--brand); }
    .btn.outline { background: transparent; color: white; border: 1px solid rgba(255,255,255,.22); }
    .grid-2 {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .grid-2-equal {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 18px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }
    .card h2, .card h3 {
      margin: 0 0 8px;
    }
    .sub {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
      margin-bottom: 16px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      font-size: 13px;
      color: #334155;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .input, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: white;
      color: var(--text);
    }
    .textarea { min-height: 105px; resize: vertical; }
    .dash-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }
    .mini {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .mini .cap { color: var(--muted); font-size: 12px; }
    .mini .big { font-size: 34px; font-weight: bold; margin-top: 6px; }
    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .pill.green { background: var(--green-bg); color: var(--green-tx); border-color: #a7f3d0; }
    .pill.amber { background: var(--amber-bg); color: var(--amber-tx); border-color: #fde68a; }
    .pill.rose { background: var(--rose-bg); color: var(--rose-tx); border-color: #fecdd3; }
    .progress-wrap { margin-top: 10px; }
    .progress {
      height: 8px;
      background: #eef2f7;
      border-radius: 999px;
      overflow: hidden;
    }
    .progress > div {
      height: 100%;
      background: linear-gradient(90deg, #0f172a, #64748b);
    }
    .prongs { display: grid; gap: 12px; }
    .panel {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .soft-box {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fafafa;
    }
    .listbox { border: 1px solid var(--line); border-radius: 18px; padding: 14px; }
    .rank-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 8px;
      font-size: 14px;
      font-weight: 600;
    }
    .rank-row.green { background: var(--green-bg); color: var(--green-tx); }
    .rank-row.rose { background: var(--rose-bg); color: var(--rose-tx); }
    .flow-card { margin-bottom: 18px; }
    .flow-row {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      align-items: stretch;
    }
    .flow-node {
      min-width: 220px;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: white;
    }
    .flow-arrow {
      display: flex;
      align-items: center;
      color: #94a3b8;
      font-size: 24px;
      padding: 0 4px;
    }
    .sections { display: grid; gap: 18px; }
    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 14px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
    }
    .metric-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .weight { color: var(--muted); font-size: 12px; }
    .metric-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }
    .range-row {
      margin-top: 8px;
    }
    .ticks {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 11px;
      margin-top: 6px;
    }
    .note-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      margin-top: 14px;
      align-items: end;
    }
    .checkline {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      height: fit-content;
      white-space: nowrap;
    }
    .tip-card {
      margin-top: 18px;
      border: 1px dashed #cbd5e1;
      border-radius: 24px;
      background: white;
      padding: 20px;
      color: var(--muted);
      line-height: 1.7;
    }
    #radarBox {
      width: 100%;
      min-height: 420px;
    }
    .radar-legend {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    .copyright-box {
      margin-top: 16px;
      background: #f1f5f9;
      border-radius: 16px;
      padding: 12px;
      font-size: 12px;
      color: #475569;
    }
    @media (max-width: 980px) {
      .hero-grid, .grid-2, .grid-2-equal, .form-grid, .metrics, .info-grid, .note-grid { grid-template-columns: 1fr; }
      .action-box { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 30px; }
    }
    @media print {
      .no-print { display: none !important; }
      body { background: white; }
      .card, .hero, .tip-card { box-shadow: none; }
      .wrap { max-width: 100%; padding: 0; }
    }
  </style>
</head>

        { key: 'curatorNetwork', weight: 1.1, inputType: 'count', maxGood: 10 },
        { key: 'galleryRelations', weight: 1.0, inputType: 'count', maxGood: 6 },
        { key: 'professionalMemberships', weight: 0.8, inputType: 'count', maxGood: 5 },
        { key: 'ecosystemCredibility', weight: 1.1, inputType: 'count', maxGood: 8 }
      ], noteKey: 'networkNote', evidenceKey: 'networkEvidence', mapsTo: ['prong2','prong3'] },
      { id: 'impact', fields: [
        { key: 'lecturesWorkshops', weight: 0.9, inputType: 'count', maxGood: 15 },
        { key: 'mentoringInfluence', weight: 0.8, inputType: 'count', maxGood: 10 },
        { key: 'publicDialogue', weight: 1.2, inputType: 'count', maxGood: 8 },
        { key: 'fieldInfluence', weight: 1.2, inputType: 'count', maxGood: 6 }
      ], noteKey: 'impactNote', evidenceKey: 'impactEvidence', mapsTo: ['prong1','prong2','prong3'] },
      { id: 'continuity', fields: [
        { key: 'yearsActive', weight: 1.0, inputType: 'count', maxGood: 15 },
        { key: 'seriesDevelopment', weight: 1.1, inputType: 'count', maxGood: 10 },
        { key: 'outputContinuity', weight: 1.1, inputType: 'count', maxGood: 6 },
        { key: 'careerCoherence', weight: 1.0, inputType: 'qualitative' }
      ], noteKey: 'continuityNote', evidenceKey: 'continuityEvidence', mapsTo: ['prong2','prong3'] },
      { id: 'international', fields: [
        { key: 'internationalShows', weight: 1.1, inputType: 'count', maxGood: 10 },
        { key: 'residencies', weight: 1.0, inputType: 'count', maxGood: 6 },
        { key: 'crossBorderCollaborations', weight: 1.0, inputType: 'count', maxGood: 8 },
        { key: 'globalRelevance', weight: 1.0, inputType: 'qualitative' }
      ], noteKey: 'internationalNote', evidenceKey: 'internationalEvidence', mapsTo: ['prong1','prong2'] },
      { id: 'usRelevance', fields: [
        { key: 'usShows', weight: 1.2, inputType: 'count', maxGood: 6 },
        { key: 'usInstitutionLinks', weight: 1.3, inputType: 'count', maxGood: 8 },
        { key: 'usIssueRelevance', weight: 1.3, inputType: 'qualitative' },
        { key: 'usAudiencePotential', weight: 1.0, inputType: 'qualitative' }
      ], noteKey: 'usRelevanceNote', evidenceKey: 'usRelevanceEvidence', mapsTo: ['prong1','prong3'] },
      { id: 'future', fields: [
        { key: 'futureSpecificity', weight: 1.3, inputType: 'count', maxGood: 5 },
        { key: 'futureFeasibility', weight: 1.2, inputType: 'qualitative' },
        { key: 'futureInstitutionalSupport', weight: 1.2, inputType: 'count', maxGood: 6 },
        { key: 'futureNationalImportance', weight: 1.3, inputType: 'qualitative' }
      ], noteKey: 'futureNote', evidenceKey: 'futureEvidence', mapsTo: ['prong1','prong2','prong3'] }
    ];

    let lang = 'ko';
    const state = {
      applicantName: '', medium: '', nationality: '', yearsSummary: '', customSummary: ''
    };
    blueprint.forEach(sec => {
      sec.fields.forEach(f => state[f.key] = 0);
      state[sec.noteKey] = '';
      state[sec.evidenceKey] = false;
    });

    function countToFive(v, maxGood) {
      v = Number(v || 0);
      if (v <= 0) return 0;
      return Math.min(5, Number(((v / maxGood) * 5).toFixed(2)));
    }
    function sectionScore(sec) {
      let totalWeight = 0, weighted = 0;
      sec.fields.forEach(f => {
        totalWeight += f.weight;
        const val = f.inputType === 'count' ? countToFive(state[f.key], f.maxGood) : Number(state[f.key] || 0);
        weighted += val * f.weight;
      });
      return Number(((weighted / (totalWeight * 5)) * 100).toFixed(1));
    }
    function scoreLabel(score) {
      const t = tr[lang];
      if (score >= 80) return { text: t.strong, cls: 'green' };
      if (score >= 60) return { text: t.moderate, cls: 'amber' };
      return { text: t.weak, cls: 'rose' };
    }
    function avg(arr) {
      if (!arr.length) return 0;
      return Number((arr.reduce((a,b) => a + b, 0) / arr.length).toFixed(1));
    }
    function currentSections() {
      const tt = tr[lang].sections;
      return blueprint.map(sec => ({
        ...sec,
        title: tt[sec.id].title,
        short: tt[sec.id].short,
        desc: tt[sec.id].desc,
        labels: tt[sec.id].labels
      }));
    }
    function calc() {
      const sections = currentSections();
      const scores = {};
      sections.forEach(s => scores[s.id] = sectionScore(s));
      const total = Number((Object.values(scores).reduce((a,b)=>a+b,0) / sections.length).toFixed(1));
      const prongs = {
        prong1: avg(sections.filter(s => s.mapsTo.includes('prong1')).map(s => scores[s.id])),
        prong2: avg(sections.filter(s => s.mapsTo.includes('prong2')).map(s => scores[s.id])),
        prong3: avg(sections.filter(s => s.mapsTo.includes('prong3')).map(s => scores[s.id]))
      };
      return { sections, scores, total, prongs };
    }

    function bindBasics() {
      ['applicantName','medium','nationality','yearsSummary','customSummary'].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener('input', e => { state[id] = e.target.value; render(); });
      });
    }

    function renderStaticText() {
      const t = tr[lang];
      document.documentElement.lang = lang;
      document.getElementById('appTag').textContent = t.appTag;
      document.getElementById('appTitle').textContent = t.appTitle;
      document.getElementById('appDesc').textContent = t.appDesc;
      document.getElementById('protectTitle').textContent = t.protectTitle;
      document.getElementById('protectText').textContent = t.protectText;
      document.getElementById('copyrightText').textContent = COPYRIGHT;
      document.getElementById('printBtn').textContent = t.print;
      document.getElementById('jsonBtn').textContent = t.saveJson;
      document.getElementById('summaryBtn').textContent = t.saveSummary;
      document.getElementById('resetBtn').textContent = t.reset;
      document.getElementById('basicInfoTitle').textContent = t.basicInfo;
      document.getElementById('basicInfoDesc').textContent = t.basicInfoDesc;
      document.getElementById('labelApplicant').textContent = t.applicantName;
      document.getElementById('labelMedium').textContent = t.medium;
      document.getElementById('labelNationality').textContent = t.nationality;
      document.getElementById('labelYears').textContent = t.yearsSummary;
      document.getElementById('labelCaseSummary').textContent = t.caseSummary;
      document.getElementById('dashboardTitle').textContent = t.dashboard;
      document.getElementById('dashboardDesc').textContent = t.dashboardDesc;
      document.getElementById('totalScoreLabel').textContent = t.totalScore;
      document.getElementById('evidenceDoneLabel').textContent = t.evidenceDone;
      document.getElementById('evidenceDoneDesc').textContent = t.evidenceDoneDesc;
      document.getElementById('radarTitle').textContent = t.radar;
      document.getElementById('radarDesc').textContent = t.radarDesc;
      document.getElementById('radarLegend').textContent = t.radarLegend;
      document.getElementById('autoTitle').textContent = t.auto;
      document.getElementById('autoDesc').textContent = t.autoDesc;
      document.getElementById('recommendedLabel').textContent = t.recommended;
      document.getElementById('topStrengthsLabel').textContent = t.topStrengths;
      document.getElementById('topWeaknessesLabel').textContent = t.topWeaknesses;
      document.getElementById('summaryLabel').textContent = t.summary;
      document.getElementById('prongHintsLabel').textContent = t.prongHints;
      document.getElementById('flowTitle').textContent = t.flowTitle;
      document.getElementById('flowDesc').textContent = t.flowDesc;
      document.getElementById('usageTitle').textContent = t.usageTitle;
      document.getElementById('usageDesc').textContent = t.usageDesc;
      document.getElementById('copyrightBox').textContent = COPYRIGHT;
      document.getElementById('applicantName').placeholder = t.applicantName;
      document.getElementById('medium').placeholder = t.medium;
      document.getElementById('nationality').placeholder = t.nationality;
      document.getElementById('yearsSummary').placeholder = t.yearsSummary;
      document.getElementById('customSummary').placeholder = t.caseSummary;
      document.querySelectorAll('.lang-toggle button').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
    }

    function renderProngs(prongs) {
      const t = tr[lang];
      const wrap = document.getElementById('prongs');
      wrap.innerHTML = '';
      ['prong1','prong2','prong3'].forEach(key => {
        const score = prongs[key];
        const lbl = scoreLabel(score);
        const div = document.createElement('div');
        div.className = 'panel';
        div.innerHTML = `
          <div class="panel-head">
            <div>${t.prongs[key]}</div>
            <span class="pill ${lbl.cls}">${score}</span>
          </div>
          <div class="progress-wrap"><div class="progress"><div style="width:${score}%"></div></div></div>
        `;
        wrap.appendChild(div);
      });
    }

    function renderRadar(scores) {
      const labels = currentSections().map(s => s.short);
      const values = currentSections().map(s => scores[s.id]);
      const box = document.getElementById('radarBox');
      const width = box.clientWidth || 560;
      const height = 420;
      const cx = width / 2;
      const cy = 215;
      const radius = Math.min(width, 420) * 0.28;
      const levels = 5;
      const n = labels.length;
      let svg = `<svg width="100%" height="${height}" viewBox="0 0 ${width} ${height}">`;
      for (let level = 1; level <= levels; level++) {
        const r = radius * (level / levels);
        let pts = [];
        for (let i = 0; i < n; i++) {
          const angle = -Math.PI / 2 + (Math.PI * 2 * i / n);
          pts.push(`${cx + Math.cos(angle) * r},${cy + Math.sin(angle) * r}`);
        }
        svg += `<polygon points="${pts.join(' ')}" fill="none" stroke="#cbd5e1" stroke-width="1" />`;
      }
      for (let i = 0; i < n; i++) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * i / n);
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;
        svg += `<line x1="${cx}" y1="${cy}" x2="${x}" y2="${y}" stroke="#cbd5e1" stroke-width="1" />`;
        const lx = cx + Math.cos(angle) * (radius + 28);
        const ly = cy + Math.sin(angle) * (radius + 28);
        svg += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="12" fill="#475569">${labels[i]}</text>`;
      }
      let dataPts = [];
      for (let i = 0; i < n; i++) {
        const angle = -Math.PI / 2 + (Math.PI * 2 * i / n);
        const r = radius * (values[i] / 100);
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        dataPts.push([x,y]);
      }
      svg += `<polygon points="${dataPts.map(p => p.join(',')).join(' ')}" fill="rgba(29,78,216,.18)" stroke="#1d4ed8" stroke-width="2" />`;
      dataPts.forEach(p => {
        svg += `<circle cx="${p[0]}" cy="${p[1]}" r="3.5" fill="#1d4ed8" />`;
      });
      svg += `</svg>`;
      box.innerHTML = svg;
    }

    function renderAnalysis(sections, scores, total, prongs) {
      const t = tr[lang];
      const totalPill = scoreLabel(total);
      document.getElementById('totalScoreValue').textContent = total;
      const tp = document.getElementById('totalScorePill');
      tp.textContent = totalPill.text;
      tp.className = `pill ${totalPill.cls}`;
      const evidenceCount = sections.filter(s => state[s.evidenceKey]).length;
      document.getElementById('evidenceDoneValue').textContent = `${evidenceCount} / ${sections.length}`;
      renderProngs(prongs);
      renderRadar(scores);

      const strengths = [...sections].sort((a,b) => scores[b.id] - scores[a.id]).slice(0,3);
      const weaknesses = [...sections].sort((a,b) => scores[a.id] - scores[b.id]).slice(0,3);
      const strengthBox = document.getElementById('topStrengths');
      const weakBox = document.getElementById('topWeaknesses');
      strengthBox.innerHTML = '';
      weakBox.innerHTML = '';
      strengths.forEach(s => {
        strengthBox.innerHTML += `<div class="rank-row green"><span>${s.short}</span><span>${scores[s.id]}</span></div>`;
      });
      weaknesses.forEach(s => {
        weakBox.innerHTML += `<div class="rank-row rose"><span>${s.short}</span><span>${scores[s.id]}</span></div>`;
      });

      let direction = t.narratives.pureAndUs;
      if (scores.philosophy >= 75 && scores.reviews >= 70 && scores.usRelevance < 60) direction = t.narratives.needUsBridge;
      else if (scores.usRelevance >= 75 && scores.future >= 75) direction = t.narratives.strongUsFuture;
      else if (scores.exhibitions >= 75 && scores.reviews < 60) direction = t.narratives.strongShowWeakReview;
      document.getElementById('recommendedText').textContent = direction;

      const summaryItems = [];
      const strengthNames = sections.filter(s => scores[s.id] >= 80).map(s => s.short);
      const riskNames = sections.filter(s => scores[s.id] < 60).map(s => s.short);
      const evidenceGaps = sections.filter(s => !state[s.evidenceKey]).map(s => s.short);
      if (strengthNames.length) summaryItems.push((lang === 'ko') ? `강점은 ${strengthNames.join(', ')} 영역입니다.` : (lang === 'en') ? `The strongest areas are ${strengthNames.join(', ')}.` : `最强的部分是 ${strengthNames.join('、')}。`);
      if (riskNames.length) summaryItems.push((lang === 'ko') ? `보완이 필요한 영역은 ${riskNames.join(', ')}입니다.` : (lang === 'en') ? `The areas needing more support are ${riskNames.join(', ')}.` : `需要补强的部分是 ${riskNames.join('、')}。`);
      if (evidenceGaps.length) summaryItems.push((lang === 'ko') ? `현재 증빙 체크가 없는 영역은 ${evidenceGaps.join(', ')}입니다.` : (lang === 'en') ? `Sections without evidence checkmarks are currently ${evidenceGaps.join(', ')}.` : `目前尚未勾选证据的部分有 ${evidenceGaps.join('、')}。`);

      const summaryList = document.getElementById('summaryList');
      summaryList.innerHTML = '';
      (summaryItems.length ? summaryItems : [t.insufficient]).forEach(x => {
        const li = document.createElement('li');
        li.textContent = x;
        summaryList.appendChild(li);
      });

      const hints = [];
      if (scores.usRelevance < 60) hints.push(t.narratives.hintUs);
      if (scores.future < 60) hints.push(t.narratives.hintFuture);
      if (scores.reviews < 60) hints.push(t.narratives.hintReviews);
      if (scores.network < 60) hints.push(t.narratives.hintNetwork);
      const hintsList = document.getElementById('prongHintsList');
      hintsList.innerHTML = '';
      (hints.length ? hints : [t.balanced]).forEach(x => {
        const li = document.createElement('li');
        li.textContent = x;
        hintsList.appendChild(li);
      });
    }

    function renderFlow(sections, scores) {
      const t = tr[lang];
      const ids = ['philosophy','relatedActivities','exhibitions','reviews','usRelevance','future'];
      const row = document.getElementById('flowRow');
      row.innerHTML = '';
      ids.forEach((id, idx) => {
        const s = sections.find(x => x.id === id);
        const label = scoreLabel(scores[id]);
        const node = document.createElement('div');
        node.className = 'flow-node';
        node.innerHTML = `
          <div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;">
            <div>
              <div style="font-weight:700;font-size:14px">${s.short}</div>
              <div style="font-size:12px;color:#64748b;margin-top:4px">${t.logicNode}</div>
            </div>
            <span class="pill ${label.cls}">${label.text}</span>
          </div>
          <div style="margin-top:10px;font-size:12px;color:#64748b;line-height:1.6;min-height:52px">${state[s.noteKey] || t.noMemo}</div>
          <div style="margin-top:10px;font-size:12px;color:${state[s.evidenceKey] ? '#047857' : '#be123c'}">${state[s.evidenceKey] ? t.evidenceChecked : t.evidenceNeeded}</div>
        `;
        row.appendChild(node);
        if (idx < ids.length - 1) {
          const arrow = document.createElement('div');
          arrow.className = 'flow-arrow';
          arrow.textContent = '→';
          row.appendChild(arrow);
        }
      });
    }

    function createMetricInput(field, label, sec, t) {
      const box = document.createElement('div');
      box.className = 'metric';
      const auto = field.inputType === 'count' ? countToFive(state[field.key], field.maxGood) : Number(state[field.key] || 0);
      const metricTop = document.createElement('div');
      metricTop.className = 'metric-top';
      metricTop.innerHTML = `<div style="font-size:14px;font-weight:600;line-height:1.5">${label}</div><div class="weight">Weight ${field.weight}</div>`;
      box.appendChild(metricTop);
      if (field.inputType === 'count') {
        const input = document.createElement('input');
        input.type = 'number';
        input.min = '0';
        input.value = state[field.key];
        input.className = 'input';
        input.addEventListener('input', e => { state[field.key] = Number(e.target.value || 0); render(); });
        box.appendChild(input);
        const meta = document.createElement('div');
        meta.className = 'metric-meta';
        meta.innerHTML = `<span>${t.countValue}: ${state[field.key]}</span><span>${t.autoScore}: ${auto.toFixed(1)} / 5</span>`;
        box.appendChild(meta);
        const pwrap = document.createElement('div');
        pwrap.className = 'progress-wrap';
        pwrap.innerHTML = `<div class="progress"><div style="width:${(auto/5)*100}%"></div></div>`;
        box.appendChild(pwrap);
      } else {
        const rangeWrap = document.createElement('div');
        rangeWrap.className = 'range-row';
        const input = document.createElement('input');
        input.type = 'range';
        input.min = '0'; input.max = '5'; input.step = '1'; input.value = state[field.key];
        input.style.width = '100%';
        input.addEventListener('input', e => { state[field.key] = Number(e.target.value); render(); });
        const ticks = document.createElement('div');
        ticks.className = 'ticks';
        ticks.innerHTML = SCALE_LABELS.map(x => `<span>${x}</span>`).join('');
        const meta = document.createElement('div');
        meta.className = 'metric-meta';
        const desc = state[field.key] >= 4 ? t.strong : state[field.key] >= 2 ? t.moderate : t.weak;
        meta.innerHTML = `<span>${t.score}: ${state[field.key]} / 5</span><span>${desc}</span>`;
        rangeWrap.appendChild(input);
        rangeWrap.appendChild(ticks);
        box.appendChild(rangeWrap);
        box.appendChild(meta);
      }
      return box;
    }

    function renderSections(sections, scores) {
      const t = tr[lang];
      const wrap = document.getElementById('sections');
      wrap.innerHTML = '';
      sections.forEach(sec => {
        const label = scoreLabel(scores[sec.id]);
        const card = document.createElement('section');
        card.className = 'card';
        card.innerHTML = `
          <div class="section-head">
            <div>
              <h3>${sec.title}</h3>
              <div class="sub" style="margin:0">${sec.desc}</div>
            </div>
            <span class="pill ${label.cls}">${label.text} · ${scores[sec.id]}</span>
          </div>
          <div class="progress-wrap"><div class="progress"><div style="width:${scores[sec.id]}%"></div></div></div>
        `;
        const metrics = document.createElement('div');
        metrics.className = 'metrics';
        sec.fields.forEach((field, idx) => metrics.appendChild(createMetricInput(field, sec.labels[idx], sec, t)));
        card.appendChild(metrics);
        const noteGrid = document.createElement('div');
        noteGrid.className = 'note-grid';
        noteGrid.innerHTML = `
          <div>
            <label>${t.attorneyMemo}</label>
            <textarea class="textarea" id="${sec.noteKey}">${state[sec.noteKey] || ''}</textarea>
          </div>
          <label class="checkline"><input type="checkbox" id="${sec.evidenceKey}" ${state[sec.evidenceKey] ? 'checked' : ''} /> ${t.evidenceSecured}</label>
        `;
        card.appendChild(noteGrid);
        wrap.appendChild(card);
      });
      sections.forEach(sec => {
        document.getElementById(sec.noteKey).addEventListener('input', e => { state[sec.noteKey] = e.target.value; render(); });
        document.getElementById(sec.evidenceKey).addEventListener('change', e => { state[sec.evidenceKey] = e.target.checked; render(); });
      });
    }

    function render() {
      renderStaticText();
      const { sections, scores, total, prongs } = calc();
      renderAnalysis(sections, scores, total, prongs);
      renderFlow(sections, scores);
      renderSections(sections, scores);
    }

    function downloadBlob(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    document.querySelectorAll('.lang-toggle button').forEach(btn => {
      btn.addEventListener('click', () => { lang = btn.dataset.lang; render(); });
    });
    document.getElementById('printBtn').addEventListener('click', () => window.print());
    document.getElementById('jsonBtn').addEventListener('click', () => {
      const { sections, scores, total, prongs } = calc();
      downloadBlob(
        `${state.applicantName || 'artist-niw-matrix'}.json`,
        JSON.stringify({
          brand: APP_BRAND,
          office: {
            name: 'LAW OFFICE OF HONG-MIN JUN',
            address: FIXED_ADDRESS,
            email: 'askus@junlawfirm.com',
            phones: ['847-660-4233','317-701-2768'],
            copyright: COPYRIGHT
          },
          language: lang,
          profile: {
            applicantName: state.applicantName,
            medium: state.medium,
            nationality: state.nationality,
            yearsSummary: state.yearsSummary,
            customSummary: state.customSummary
          },
          state,
          sectionScores: scores,
          prongs,
          totalScore: total,
          generatedAt: new Date().toISOString()
        }, null, 2),
        'application/json'
      );
    });
    document.getElementById('summaryBtn').addEventListener('click', () => {
      const { sections, scores, total, prongs } = calc();
      const t = tr[lang];
      const lines = [
        APP_BRAND,
        FIXED_ADDRESS,
        COPYRIGHT,
        '',
        `${t.applicantName}: ${state.applicantName || '-'}`,
        `${t.medium}: ${state.medium || '-'}`,
        `${t.nationality}: ${state.nationality || '-'}`,
        `${t.yearsSummary}: ${state.yearsSummary || '-'}`,
        `${t.caseSummary}: ${state.customSummary || '-'}`,
        '',
        `${t.totalScore}: ${total}`,
        `${t.prongs.prong1}: ${prongs.prong1}`,
        `${t.prongs.prong2}: ${prongs.prong2}`,
        `${t.prongs.prong3}: ${prongs.prong3}`,
        '',
        ...sections.map(s => `${s.title}: ${scores[s.id]}`)
      ].join('\n');
      downloadBlob(`${state.applicantName || 'artist-niw-matrix-summary'}.txt`, lines, 'text/plain;charset=utf-8');
    });
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!confirm(lang === 'ko' ? '입력값을 모두 초기화하시겠습니까?' : lang === 'en' ? 'Reset all inputs?' : '要重置所有输入吗？')) return;
      Object.keys(state).forEach(k => state[k] = (typeof state[k] === 'boolean') ? false : (typeof state[k] === 'number' ? 0 : ''));
      render();
    });

    bindBasics();
    render();
  </script>
</body>
